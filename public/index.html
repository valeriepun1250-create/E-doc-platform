<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OT Assessment Platform</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div class="brand">
    <h1>OT Assessment Platform</h1>
  </div>
  <nav id="nav">
    <button data-view="browse" class="active">Home page</button>
  </nav>
</header>

<main id="app"></main>

<!-- Templates -->
<template id="tpl-browse">
  <section class="view">
    <div class="new-case">
      <h3 style="margin-top:0">Create new case</h3>
      <div class="row" style="gap:12px;align-items:flex-end;flex-wrap:wrap;">
        <label style="flex:1;min-width:180px">Ward / Bed number / Initial
          <input type="text" id="ncCaseId" placeholder="e.g. E8/23/Chan TM" />
        </label>
        <label style="min-width:170px">Assessment date
          <input type="date" id="ncDate" />
        </label>
        <label style="flex:1;min-width:240px">Assessment form
          <select id="ncForm"><option value="">Select form…</option></select>
        </label>
        <button id="ncStart" class="primary" type="button">Start</button>
      </div>
      <p id="ncErr" class="err"></p>
    </div>

    <h3 style="margin-top:18px">History</h3>
    <p class="muted" style="margin-top:0">Saved locally on this device. Reports auto-delete 7 days after saving.</p>
    <div id="historyList" class="card-list"></div>
  </section>
</template>

<template id="tpl-fill">
  <section class="view">
    <button class="back">&larr; Back</button>
    <h2 id="fTitle"></h2>
    <p id="fDesc" class="muted"></p>
    <form id="fillForm"></form>
    <div class="actions">
      <button type="button" id="btnSaveDraft">Save Draft</button>
      <button type="button" id="btnSaveGenerate" class="primary">Save &amp; Generate Report</button>
      <button type="button" id="btnPreview">Preview report</button>
    </div>
    <pre id="reportPreview" class="report" hidden></pre>
  </section>
</template>

<template id="tpl-report">
  <section class="view">
    <button class="back">&larr; Back</button>
    <h2 id="rTitle"></h2>
    <p id="rMeta" class="muted"></p>
    <div id="rParts" class="report-parts"></div>
  </section>
</template>

<script src="app.js"></script>
</body>
</html>
