<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OT E-Documentation Home</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="main-home-page">
<main id="mainHome" class="main-home">
  <section class="main-home-hero">
    <a class="main-home-hero-link" href="./">Main Home</a>
    <p class="home-hospital">QUEEN ELIZABETH HOSPITAL</p>
    <h1 class="home-title">OT E-Documentation Hub</h1>
  </section>

  <section class="home-panel platform-panel">
    <div class="home-section-title-row">
      <h2 class="home-heading">Assessment Platforms</h2>
    </div>
    <div class="platform-grid">
      <a class="platform-card platform-card-active" href="ns/">
        <span class="platform-tag">NS</span>
        <strong>NS E-Documentation Platform</strong>
      </a>
      <div class="platform-card platform-card-disabled" aria-disabled="true">
        <span class="platform-tag platform-tag-medical">Medical</span>
        <strong>Medical Platform</strong>
        <span>Coming later.</span>
      </div>
      <div class="platform-card platform-card-disabled" aria-disabled="true">
        <span class="platform-tag platform-tag-ortho">Ortho</span>
        <strong>Ortho Platform</strong>
        <span>Coming later.</span>
      </div>
    </div>
  </section>

  <section class="home-panel home-history">
    <div class="home-section-title-row">
      <h2 class="home-heading">Shared Local History</h2>
      <button type="button" id="refreshHistory" class="home-refresh-btn">Refresh</button>
    </div>
    <div id="mainHistoryList" class="card-list home-history-list"></div>
  </section>
</main>

<div id="version-badge">v2.6</div>
<script src="home.js"></script>
</body>
</html>
